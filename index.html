<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لعبة الثعبان</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    color: #fff;
    user-select: none;
  }
  h1 {
    font-size: 2rem;
    margin-bottom: 12px;
    color: #4ade80;
    letter-spacing: 2px;
    text-shadow: 0 0 20px #4ade8088;
  }
  #score-board {
    display: flex;
    gap: 40px;
    margin-bottom: 16px;
    font-size: 1rem;
    color: #94a3b8;
  }
  #score-board span { color: #f8fafc; font-weight: 700; font-size: 1.2rem; }
  canvas {
    border: 2px solid #4ade8044;
    border-radius: 8px;
    box-shadow: 0 0 40px #4ade8022;
  }
  #overlay {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  #overlay h2 { font-size: 2rem; color: #f87171; text-shadow: 0 0 20px #f8717188; }
  #overlay p { color: #94a3b8; font-size: 1rem; }
  #overlay.hidden { display: none; }
  #hint { margin-top: 10px; color: #64748b; font-size: 0.85rem; }
</style>
</head>
<body>
<h1>🐍 لعبة الثعبان</h1>
<div id="score-board">
  النقاط: <span id="score">0</span>
  &nbsp;&nbsp;|&nbsp;&nbsp;
  أعلى نقطة: <span id="best">0</span>
</div>
<div style="position:relative">
  <canvas id="c" width="500" height="500"></canvas>
  <div id="overlay">
    <h2 id="overlay-title">ابدأ اللعبة</h2>
    <p>استخدم أسهم لوحة المفاتيح للتحكم</p>
    <p>اضغط <b>Space</b> أو <b>Enter</b> للبدء</p>
  </div>
</div>
<p id="hint">WASD أو الأسهم للتحرك</p>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlay-title');

const CELL = 25;
const COLS = 20;
const ROWS = 20;
const BASE_SPEED = 150;

let snake, dir, nextDir, apple, score, best, running, lastTime, speed;

function rand(max) { return Math.floor(Math.random() * max); }

function newApple() {
  let pos;
  do {
    pos = { x: rand(COLS), y: rand(ROWS) };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  return pos;
}

function init() {
  snake = [
    { x: 10, y: 10 },
    { x: 9, y: 10 },
    { x: 8, y: 10 }
  ];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  apple = newApple();
  score = 0;
  speed = BASE_SPEED;
  scoreEl.textContent = 0;
  running = true;
  lastTime = null;
  overlay.classList.add('hidden');
  requestAnimationFrame(loop);
}

function loop(ts) {
  if (!running) return;
  if (!lastTime) lastTime = ts;
  if (ts - lastTime < speed) {
    requestAnimationFrame(loop);
    return;
  }
  lastTime = ts;
  dir = nextDir;
  step();
  draw();
  requestAnimationFrame(loop);
}

function step() {
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return die();
  if (snake.some(s => s.x === head.x && s.y === head.y)) return die();
  snake.unshift(head);
  if (head.x === apple.x && head.y === apple.y) {
    score += 10;
    scoreEl.textContent = score;
    if (score > best) { best = score; bestEl.textContent = best; }
    speed = Math.max(60, BASE_SPEED - Math.floor(score / 50) * 10);
    apple = newApple();
  } else {
    snake.pop();
  }
}

function die() {
  running = false;
  overlayTitle.textContent = 'انتهت اللعبة!';
  overlay.classList.remove('hidden');
  overlay.querySelector('p:last-of-type').textContent = 'اضغط Space أو Enter للمحاولة مجدداً';
}

function drawCell(x, y, color, radius = 4) {
  const px = x * CELL + 1;
  const py = y * CELL + 1;
  const s = CELL - 2;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.roundRect(px, py, s, s, radius);
  ctx.fill();
}

function draw() {
  ctx.fillStyle = '#0f0f1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = '#1e293b';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= COLS; i++) {
    ctx.beginPath(); ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, canvas.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i * CELL); ctx.lineTo(canvas.width, i * CELL); ctx.stroke();
  }

  snake.forEach((s, i) => {
    const ratio = 1 - i / snake.length;
    const g = Math.floor(100 + ratio * 118);
    drawCell(s.x, s.y, i === 0 ? '#86efac' : `rgb(30,${g},60)`);
  });

  const ax = apple.x * CELL + CELL / 2;
  const ay = apple.y * CELL + CELL / 2;
  const r = (CELL - 4) / 2;
  const grad = ctx.createRadialGradient(ax - 3, ay - 3, 1, ax, ay, r);
  grad.addColorStop(0, '#fca5a5');
  grad.addColorStop(1, '#dc2626');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(ax, ay, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#854d0e';
  ctx.fillRect(ax - 1, ay - r - 4, 2, 5);
}

const DIRS = {
  ArrowUp: { x: 0, y: -1 }, ArrowDown: { x: 0, y: 1 },
  ArrowLeft: { x: -1, y: 0 }, ArrowRight: { x: 1, y: 0 },
  w: { x: 0, y: -1 }, s: { x: 0, y: 1 },
  a: { x: -1, y: 0 }, d: { x: 1, y: 0 }
};

document.addEventListener('keydown', e => {
  if ((e.key === ' ' || e.key === 'Enter') && !running) { init(); return; }
  const d = DIRS[e.key];
  if (d && !(d.x === -dir.x && d.y === -dir.y)) {
    nextDir = d;
    e.preventDefault();
  }
});
</script>
</body>
</html>
